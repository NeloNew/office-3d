{

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

// ─── PROCEDURAL TEXTURES ──────────────────────────────────────────

function createWoodTexture(w = 512, h = 512, baseColor = [200, 180, 150], plankWidth = 80) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  // Base
  ctx.fillStyle = `rgb(${baseColor[0]},${baseColor[1]},${baseColor[2]})`;
  ctx.fillRect(0, 0, w, h);
  // Planks
  for (let x = 0; x < w; x += plankWidth) {
    // Gap line
    ctx.strokeStyle = `rgba(100,80,50,0.3)`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    // Wood grain
    const grainOffset = Math.random() * 100;
    for (let y = 0; y < h; y++) {
      const noise = Math.sin(y * 0.03 + grainOffset) * 12 + Math.sin(y * 0.11 + grainOffset * 2) * 6 + Math.random() * 4;
      const v = Math.max(0, Math.min(255, baseColor[0] + noise - 10));
      const v2 = Math.max(0, Math.min(255, baseColor[1] + noise - 12));
      const v3 = Math.max(0, Math.min(255, baseColor[2] + noise - 15));
      ctx.fillStyle = `rgb(${v|0},${v2|0},${v3|0})`;
      ctx.fillRect(x + 1, y, plankWidth - 2, 1);
    }
    // Knots (sparse)
    if (Math.random() < 0.15) {
      const kx = x + plankWidth / 2 + (Math.random() - 0.5) * 30;
      const ky = Math.random() * h;
      const kr = 4 + Math.random() * 6;
      const grad = ctx.createRadialGradient(kx, ky, 0, kx, ky, kr);
      grad.addColorStop(0, `rgba(${baseColor[0]-40},${baseColor[1]-40},${baseColor[2]-40},0.5)`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(kx - kr, ky - kr, kr * 2, kr * 2);
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

function createPlasterTexture(w = 256, h = 256) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const imgData = ctx.createImageData(w, h);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const n = 128 + (Math.random() - 0.5) * 20;
    imgData.data[i] = imgData.data[i+1] = imgData.data[i+2] = n;
    imgData.data[i+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

function createNormalNoise(w = 256, h = 256, strength = 0.3) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const imgData = ctx.createImageData(w, h);
  for (let i = 0; i < imgData.data.length; i += 4) {
    imgData.data[i] = 128 + (Math.random() - 0.5) * 255 * strength;
    imgData.data[i+1] = 128 + (Math.random() - 0.5) * 255 * strength;
    imgData.data[i+2] = 255;
    imgData.data[i+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

function createRugTexture(w = 256, h = 256) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  // Base dark gray
  ctx.fillStyle = '#3a3632';
  ctx.fillRect(0, 0, w, h);
  // Subtle pattern
  for (let y = 0; y < h; y += 4) {
    for (let x = 0; x < w; x += 4) {
      const n = Math.random() * 15 - 7;
      ctx.fillStyle = `rgb(${58+n|0},${54+n|0},${50+n|0})`;
      ctx.fillRect(x, y, 4, 4);
    }
  }
  // Border
  ctx.strokeStyle = '#4a4540';
  ctx.lineWidth = 8;
  ctx.strokeRect(8, 8, w - 16, h - 16);
  ctx.strokeStyle = '#524e48';
  ctx.lineWidth = 2;
  ctx.strokeRect(16, 16, w - 32, h - 32);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  return tex;
}

// ─── SCENE SETUP ──────────────────────────────────────────────────

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);
scene.fog = new THREE.FogExp2(0x1a1a1a, 0.04);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.05, 60);
// Dollhouse default view
camera.position.set(3.5, 4.5, 2.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, -2.25);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 1.0;
controls.maxDistance = 12;
controls.maxPolarAngle = Math.PI * 0.48;
controls.update();

// ─── PROCEDURAL ENVIRONMENT ──────────────────────────────────────

const pmremGen = new THREE.PMREMGenerator(renderer);
pmremGen.compileEquirectangularShader();

function createProcEnv() {
  const envScene = new THREE.Scene();
  // Warm gradient sky
  const c1 = new THREE.Color(0xffecd2);
  const c2 = new THREE.Color(0xfcb69f);
  const c3 = new THREE.Color(0x89CFF0);
  
  // Ground
  const gFloor = new THREE.Mesh(
    new THREE.PlaneGeometry(100, 100),
    new THREE.MeshBasicMaterial({ color: 0x8b7355, side: THREE.DoubleSide })
  );
  gFloor.rotation.x = -Math.PI / 2;
  gFloor.position.y = -2;
  envScene.add(gFloor);
  
  // Sky dome
  const skyGeo = new THREE.SphereGeometry(40, 16, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor: { value: new THREE.Color(0x89CFF0) },
      bottomColor: { value: new THREE.Color(0xffecd2) },
    },
    vertexShader: `varying vec3 vWorldPos;
      void main() { vec4 wp = modelMatrix * vec4(position, 1.0); vWorldPos = wp.xyz; gl_Position = projectionMatrix * viewMatrix * wp; }`,
    fragmentShader: `uniform vec3 topColor; uniform vec3 bottomColor; varying vec3 vWorldPos;
      void main() { float h = normalize(vWorldPos).y * 0.5 + 0.5; gl_FragColor = vec4(mix(bottomColor, topColor, h), 1.0); }`
  });
  envScene.add(new THREE.Mesh(skyGeo, skyMat));
  
  // Sun
  const sunGeo = new THREE.SphereGeometry(3, 8, 8);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xfff5e0 });
  const sunMesh = new THREE.Mesh(sunGeo, sunMat);
  sunMesh.position.set(0, 10, -35);
  envScene.add(sunMesh);
  
  envScene.add(new THREE.AmbientLight(0xffffff, 0.5));
  
  const envMap = pmremGen.fromScene(envScene, 0.02).texture;
  envScene.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) { if (o.material.map) o.material.map.dispose(); o.material.dispose(); } });
  return envMap;
}

const envMap = createProcEnv();
scene.environment = envMap;

// ─── MATERIALS ────────────────────────────────────────────────────

const floorTex = createWoodTexture(1024, 1024, [205, 185, 155], 90);
floorTex.repeat.set(2, 3);
const floorNorm = createNormalNoise(512, 512, 0.15);
floorNorm.repeat.set(2, 3);

const floorMat = new THREE.MeshPhysicalMaterial({
  map: floorTex, normalMap: floorNorm, normalScale: new THREE.Vector2(0.3, 0.3),
  roughness: 0.55, metalness: 0.0, clearcoat: 0.15, clearcoatRoughness: 0.4,
  envMap, envMapIntensity: 0.3
});

const plasterTex = createPlasterTexture();
const wallNorm = createNormalNoise(256, 256, 0.08);

const wallWhiteMat = new THREE.MeshStandardMaterial({
  color: 0xf5f2ed, roughness: 0.92, map: plasterTex, normalMap: wallNorm,
  normalScale: new THREE.Vector2(0.15, 0.15), envMap, envMapIntensity: 0.1
});
const accentWallMat = new THREE.MeshStandardMaterial({
  color: 0x7b8fa1, roughness: 0.85, map: plasterTex, normalMap: wallNorm,
  normalScale: new THREE.Vector2(0.12, 0.12), envMap, envMapIntensity: 0.15
});

const deskTex = createWoodTexture(512, 512, [185, 165, 130], 60);
const deskMat = new THREE.MeshPhysicalMaterial({
  map: deskTex, roughness: 0.4, metalness: 0.02, clearcoat: 0.2,
  clearcoatRoughness: 0.3, envMap, envMapIntensity: 0.4
});
const deskLegMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.7 });

const chairMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.7, metalness: 0.05 });
const chairMetalMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.25, metalness: 0.8 });
const chairMeshMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a1a, roughness: 0.9, transparent: true, opacity: 0.85, side: THREE.DoubleSide
});

const macBodyMat = new THREE.MeshPhysicalMaterial({
  color: 0xc0c0c0, roughness: 0.15, metalness: 0.9, clearcoat: 0.5,
  clearcoatRoughness: 0.1, envMap, envMapIntensity: 0.6
});
const macScreenMat = new THREE.MeshStandardMaterial({
  color: 0x111111, roughness: 0.05, metalness: 0.3, emissive: 0x2244aa, emissiveIntensity: 0.4
});
const macKeyMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.6, metalness: 0.2 });

const plantGreenMat = new THREE.MeshStandardMaterial({ color: 0x3d6b3d, roughness: 0.8 });
const plantDarkMat = new THREE.MeshStandardMaterial({ color: 0x2d5a2d, roughness: 0.85 });
const plantPotMat = new THREE.MeshStandardMaterial({ color: 0xe0d5c5, roughness: 0.75 });
const soilMat = new THREE.MeshStandardMaterial({ color: 0x3e2f1f, roughness: 0.95 });

const windowGlassMat = new THREE.MeshPhysicalMaterial({
  color: 0xddeeff, roughness: 0.02, metalness: 0.0, transparent: true, opacity: 0.15,
  transmission: 0.8, thickness: 0.01, envMap, envMapIntensity: 0.5
});
const windowFrameMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.35, metalness: 0.3 });
const doorMat = new THREE.MeshStandardMaterial({ color: 0xf0ece6, roughness: 0.65 });
const doorHandleMat = new THREE.MeshStandardMaterial({ color: 0xb0b0b0, roughness: 0.2, metalness: 0.85 });

const ledPanelMat = new THREE.MeshStandardMaterial({
  color: 0xfffbf0, emissive: 0xfff5e0, emissiveIntensity: 1.5, roughness: 0.3
});
const ledPanelFrameMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.3, metalness: 0.5 });
const ledStripMat = new THREE.MeshStandardMaterial({
  color: 0xffcc44, emissive: 0xffcc44, emissiveIntensity: 2.0, roughness: 0.2
});
const barMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.25, metalness: 0.7 });

const rugMat = new THREE.MeshStandardMaterial({
  map: createRugTexture(), roughness: 0.95, metalness: 0.0
});

// ─── HELPERS ──────────────────────────────────────────────────────

function m(geo, mat, x, y, z) {
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  return mesh;
}

function roundedBox(w, h, d, r = 0.005, segs = 2) {
  // Approximate with bevel — use BoxGeometry with beveled edges
  return new THREE.BoxGeometry(w, h, d, segs, segs, segs);
}

// ─── ROOM DIMENSIONS ─────────────────────────────────────────────

const RW = 2.6, RL = 4.5, RH = 2.7, T = 0.12;

// ─── FLOOR ────────────────────────────────────────────────────────

const floor = m(new THREE.BoxGeometry(RW, 0.05, RL), floorMat, 0, 0, -RL/2);
floor.receiveShadow = true;
scene.add(floor);

// NO CEILING (dollhouse view)

// ─── WALLS ────────────────────────────────────────────────────────

// Back wall (accent)
const bw = m(new THREE.BoxGeometry(RW, RH, T), accentWallMat, 0, RH/2, -RL);
bw.receiveShadow = true; scene.add(bw);

// Front wall (short, solid — no door here)
const fw = m(new THREE.BoxGeometry(RW, RH, T), wallWhiteMat, 0, RH/2, 0);
scene.add(fw);

// Left wall (long, 450cm side) — with door opening centered
// Door is 95cm wide, centered on 450cm wall → opening at Z = -RL/2
const doorGap = 0.95;
const leftWallSegLen = (RL - doorGap) / 2;
// Segment closer to front (Z=0 to Z=-leftWallSegLen)
const lwFront = m(new THREE.BoxGeometry(T, RH, leftWallSegLen), wallWhiteMat, -RW/2, RH/2, -leftWallSegLen/2);
lwFront.receiveShadow = true; scene.add(lwFront);
// Segment closer to window (Z=-(leftWallSegLen+doorGap) to Z=-RL)
const lwBack = m(new THREE.BoxGeometry(T, RH, leftWallSegLen), wallWhiteMat, -RW/2, RH/2, -(RL - leftWallSegLen/2));
lwBack.receiveShadow = true; scene.add(lwBack);
// Top piece above door
const lwTop = m(new THREE.BoxGeometry(T, RH - 2.1, doorGap), wallWhiteMat, -RW/2, 2.1 + (RH - 2.1)/2, -RL/2);
scene.add(lwTop);

// Right wall (long, solid)
const rw = m(new THREE.BoxGeometry(T, RH, RL), wallWhiteMat, RW/2, RH/2, -RL/2);
rw.receiveShadow = true; scene.add(rw);

// ─── WINDOW ───────────────────────────────────────────────────────

const winW = 1.3, winH = 1.2, winY = 0.9;
const winZ = -RL + T/2 + 0.005;

// Glass
const glass = m(new THREE.PlaneGeometry(winW, winH), windowGlassMat, 0, winY + winH/2, winZ);
scene.add(glass);

// Frame pieces
const fT = 0.035;
const frameParts = [
  [winW + 0.07, fT, 0, winY - fT/2],         // sill
  [winW + 0.07, fT, 0, winY + winH + fT/2],   // top
  [fT, winH + 0.07, -winW/2 - fT/2, winY + winH/2], // left
  [fT, winH + 0.07, winW/2 + fT/2, winY + winH/2],  // right
  [fT, winH, 0, winY + winH/2],                // center vert
  [winW, fT, 0, winY + winH/2],                // center horiz
];
frameParts.forEach(([fw, fh, fx, fy]) => {
  const fm = m(new THREE.BoxGeometry(fw, fh, 0.035), windowFrameMat, fx, fy, winZ);
  fm.castShadow = true;
  scene.add(fm);
});

// Window sill ledge
const sill = m(new THREE.BoxGeometry(winW + 0.12, 0.025, 0.08), windowFrameMat, 0, winY - 0.01, winZ + 0.04);
scene.add(sill);

// ─── DOOR (on left long wall, centered at Z = -RL/2) ──────────────

// Door slab — on the left wall (X = -RW/2), oriented along Z axis
const door = m(new THREE.BoxGeometry(0.045, 2.08, 0.93), doorMat, -RW/2 + 0.025, 1.04, -RL/2);
door.castShadow = true;
scene.add(door);

// Door panel detail (on interior face, facing +X into room)
const panelInset = new THREE.MeshStandardMaterial({ color: 0xe8e4de, roughness: 0.7 });
scene.add(m(new THREE.BoxGeometry(0.005, 0.7, 0.36), panelInset, -RW/2 + 0.05, 0.55, -RL/2));
scene.add(m(new THREE.BoxGeometry(0.005, 0.7, 0.36), panelInset, -RW/2 + 0.05, 1.5, -RL/2));

// Handle (on interior side, facing into room)
const handle = m(new THREE.CylinderGeometry(0.012, 0.012, 0.1, 12), doorHandleMat, -RW/2 + 0.06, 1.0, -RL/2 + 0.35);
handle.rotation.z = Math.PI / 2;
scene.add(handle);
// Handle plate
scene.add(m(new THREE.BoxGeometry(0.008, 0.12, 0.04), doorHandleMat, -RW/2 + 0.05, 1.0, -RL/2 + 0.35));

// ─── DESK ─────────────────────────────────────────────────────────

const dW = 1.5, dD = 0.7, dH = 0.74;
const dG = new THREE.Group();

// Desktop with rounded edges (simulated with slightly beveled look)
const desktop = m(roundedBox(dD, 0.028, dW, 0.005), deskMat, 0, dH, 0);
desktop.castShadow = true; desktop.receiveShadow = true;
dG.add(desktop);

// Edge trim
const edgeMat = new THREE.MeshStandardMaterial({ color: 0xa09070, roughness: 0.4 });
dG.add(m(new THREE.BoxGeometry(dD + 0.004, 0.004, dW + 0.004), edgeMat, 0, dH - 0.016, 0));

// Metal legs (modern T-frame style)
const legH = dH - 0.014;
[-1, 1].forEach(s => {
  // T-bar across width
  const crossbar = m(new THREE.BoxGeometry(dD - 0.08, 0.035, 0.035), deskLegMat, 0, 0.035/2, s * (dW/2 - 0.06));
  dG.add(crossbar);
  // Vertical posts
  [-1, 1].forEach(v => {
    const leg = m(new THREE.BoxGeometry(0.035, legH, 0.035), deskLegMat, v * (dD/2 - 0.06), legH/2, s * (dW/2 - 0.06));
    leg.castShadow = true;
    dG.add(leg);
  });
});

// Cable management bar
dG.add(m(new THREE.BoxGeometry(0.02, 0.02, dW * 0.6), deskLegMat, -dD/2 + 0.06, dH * 0.4, 0));

dG.position.set(RW/2 - dD/2 - 0.05, 0, -(0.8 + dW/2));
scene.add(dG);

// ─── RUG ──────────────────────────────────────────────────────────

const rug = m(new THREE.BoxGeometry(1.4, 0.008, 2.0), rugMat, RW/2 - 0.9, 0.03, -(0.8 + dW/2));
rug.receiveShadow = true;
scene.add(rug);

// ─── MACBOOK ──────────────────────────────────────────────────────

const mG = new THREE.Group();

// Stand base (cleaner aluminum look)
const standBase = m(new THREE.CylinderGeometry(0.09, 0.1, 0.008, 16), macBodyMat, 0, 0, 0);
mG.add(standBase);

// Stand arm
mG.add(m(new THREE.BoxGeometry(0.025, 0.13, 0.025), macBodyMat, 0, 0.065, 0));

// Stand top cradle
mG.add(m(new THREE.BoxGeometry(0.28, 0.008, 0.04), macBodyMat, 0, 0.13, 0));

// MacBook body (closed-ish clamshell on stand, tilted)
const macBase = m(roundedBox(0.33, 0.012, 0.23), macBodyMat, 0, 0.14, 0);
mG.add(macBase);

// Keyboard area visible on base
const keyArea = m(new THREE.PlaneGeometry(0.28, 0.14), macKeyMat, 0, 0.147, 0.02);
keyArea.rotation.x = -Math.PI / 2;
mG.add(keyArea);

// Keyboard key grid
for (let row = 0; row < 5; row++) {
  for (let col = 0; col < 12; col++) {
    const key = m(
      new THREE.BoxGeometry(0.018, 0.002, 0.016),
      new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.4 }),
      -0.12 + col * 0.022, 0.148, 0.05 - row * 0.022
    );
    mG.add(key);
  }
}

// Trackpad
const trackpad = m(new THREE.BoxGeometry(0.09, 0.002, 0.06), new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.15, metalness: 0.3 }), 0, 0.148, -0.04);
mG.add(trackpad);

    const seg = m(
      new THREE.BoxGeometry(w, segH, 0.006),
      isLight ? plantGreenMat : plantDarkMat,
      Math.sin(s * 0.15) * 0.01,
      segH / 2,

const dimGroup = new THREE.Group();

function createLabel(text, position, rotation = [0, 0, 0]) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.roundRect(4, 4, 248, 56, 8);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  
  const tex = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(...position);
  sprite.scale.set(0.6, 0.15, 1);
  return sprite;
}

// ─── POST-PROCESSING ─────────────────────────────────────────────

const composer = new EffectComposer(renderer);

// Bloom (for LED glow)

  new THREE.Vector2(innerWidth, innerHeight),
  0.3,   // strength
  0.6,   // radius
  0.85   // threshold
);
composer.addPass(bloomPass);

// Vignette
const vignetteShader = {
  uniforms: {
    tDiffuse: { value: null },
    offset: { value: 0.95 },
    darkness: { value: 1.2 }
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `uniform sampler2D tDiffuse; uniform float offset; uniform float darkness; varying vec2 vUv;
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      vec2 uv = (vUv - 0.5) * 2.0;
      float vig = 1.0 - dot(uv, uv) * darkness * 0.15;
      vig = clamp(pow(vig, 1.5), 0.0, 1.0);
      color.rgb *= mix(1.0 - darkness * 0.3, 1.0, vig);
      gl_FragColor = color;
    }`
};
composer.addPass(new ShaderPass(vignetteShader));

composer.addPass(new OutputPass());

// ─── CAMERA ANIMATION ─────────────────────────────────────────────

const views = {
  dollhouse: {
    pos: new THREE.Vector3(3.5, 4.5, 2.5),
    target: new THREE.Vector3(0, 0.5, -2.25),
    maxPolar: Math.PI * 0.48
  },
  walkthrough: {
    pos: new THREE.Vector3(-RW/2 + 0.3, 1.65, -RL/2),
    target: new THREE.Vector3(0.5, 1.2, -RL/2),
    maxPolar: Math.PI * 0.85
  }
};

let currentView = 'dollhouse';
let animating = false;

function animateCamera(targetView, duration = 1200) {
  if (animating) return;
  animating = true;
  
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const endPos = views[targetView].pos.clone();
  const endTarget = views[targetView].target.clone();
  const startTime = performance.now();
  
  function easeInOut(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }
  
  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const e = easeInOut(t);
    
    camera.position.lerpVectors(startPos, endPos, e);
    controls.target.lerpVectors(startTarget, endTarget, e);
    controls.maxPolarAngle = THREE.MathUtils.lerp(
      views[currentView === targetView ? currentView : currentView].maxPolar,
      views[targetView].maxPolar, e
    );
    controls.update();
    
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      currentView = targetView;
      animating = false;
    }
  }
  requestAnimationFrame(step);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  
  // Subtle LED strip pulse

  ledStripMat.emissiveIntensity = 1.8 + Math.sin(t * 0.5) * 0.2;
  
  composer.render();
}
